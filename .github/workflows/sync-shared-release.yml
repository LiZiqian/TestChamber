name: Sync 7.2 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^7\.2\.[0-9]+$ ]]; then
            echo "VERSION must be on the 7.2.x release line, got: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_title=v$version" >> "$GITHUB_OUTPUT"
          echo "shared_tag=v7.2.0" >> "$GITHUB_OUTPUT"

      - name: Move shared 7.2 tag
        shell: bash
        env:
          SHARED_TAG: ${{ steps.version.outputs.shared_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$SHARED_TAG" "$GITHUB_SHA"
          git push --force origin "$SHARED_TAG"

      - name: Sync release title
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TITLE: ${{ steps.version.outputs.release_title }}
          SHARED_TAG: ${{ steps.version.outputs.shared_tag }}
        shell: bash
        run: |
          if gh release view "$SHARED_TAG" >/dev/null 2>&1; then
            gh release edit "$SHARED_TAG" --title "$RELEASE_TITLE"
          else
            gh release create "$SHARED_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "TestChamber V7 7.2 series shared release. Current published version: $RELEASE_TITLE."
          fi
