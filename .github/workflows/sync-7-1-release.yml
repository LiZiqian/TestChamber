name: Sync 7.1 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read app version
        id: version
        shell: bash
        run: |
          version="$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("backend/server.py").read_text(encoding="utf-8")
          match = re.search(r'^APP_VERSION\s*=\s*"([^"]+)"', text, re.M)
          if not match:
              raise SystemExit("APP_VERSION not found in backend/server.py")
          print(match.group(1))
          PY
          )"
          if [[ ! "$version" =~ ^7\.1\.[0-9]+$ ]]; then
            echo "APP_VERSION must be on the 7.1.x release line, got: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_title=v$version" >> "$GITHUB_OUTPUT"

      - name: Move shared 7.1 tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f v7.1.0 "$GITHUB_SHA"
          git push --force origin v7.1.0

      - name: Sync release title
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TITLE: ${{ steps.version.outputs.release_title }}
        shell: bash
        run: |
          if gh release view v7.1.0 >/dev/null 2>&1; then
            gh release edit v7.1.0 --title "$RELEASE_TITLE"
          else
            gh release create v7.1.0 \
              --title "$RELEASE_TITLE" \
              --notes "TestChamber V7 7.1 series shared release. Current published version: $RELEASE_TITLE."
          fi
